name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no version bump is needed'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    uses: islamelkadi/reusable-cicd-workflows/.github/workflows/terraform-release.yaml@main
    with:
      node_version: 'lts/*'
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: sso-manager-linux
          - os: macos-latest
            artifact_name: sso-manager-macos
          - os: windows-latest
            artifact_name: sso-manager-windows.exe
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
          
      - name: Install dependencies
        run: poetry install --with dev
          
      - name: Build binary
        run: poetry run pyinstaller sso-manager.spec
        
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/sso-manager dist/${{ matrix.artifact_name }}
        
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/sso-manager.exe dist/${{ matrix.artifact_name }}
        
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}