name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: sso-manager-linux
          - os: macos-latest
            artifact_name: sso-manager-macos
          - os: windows-latest
            artifact_name: sso-manager-windows.exe
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry --version
        
      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
          
      - name: Install dependencies
        run: |
          poetry --version
          poetry install --with dev
          
      - name: Verify installation
        run: |
          poetry run python --version
          poetry run python -c "import src.cli.sso; print('Import successful')"
          
      - name: Build binary
        run: |
          echo "Building binary for ${{ matrix.os }}"
          poetry run pyinstaller sso-manager.spec --clean
          
      - name: List build output (Unix)
        if: runner.os != 'Windows'
        run: ls -la dist/
        
      - name: List build output (Windows)
        if: runner.os == 'Windows'
        run: dir dist\
        
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/sso-manager dist/${{ matrix.artifact_name }}
        
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/sso-manager.exe dist/${{ matrix.artifact_name }}
        
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
          files: dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}