name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: sso-manager-linux
          - os: macos-latest
            artifact_name: sso-manager-macos
          - os: windows-latest
            artifact_name: sso-manager-windows.exe
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
          
      - name: Install dependencies
        run: poetry install --with dev
          
      - name: Build binary
        run: poetry run pyinstaller sso-manager.spec
        
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/sso-manager dist/${{ matrix.artifact_name }}
        
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/sso-manager.exe dist/${{ matrix.artifact_name }}
        
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
          files: dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}